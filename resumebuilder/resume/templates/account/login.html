{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    {% load socialaccount %}
    <div class="container">
        <h2>Login</h2>
        <form method="post" action="{% url 'account_login' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
    
        <a class="github-btn" href="{% provider_login_url 'github' %}">Login with GitHub</a>
        <p>Don't have an account? <a href="{% url 'account_signup' %}">Sign up</a></p>
    </div>
</body>
</html>
